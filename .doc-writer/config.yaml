# .doc-writer/config.yaml — generated by /doc-writer:setup
version: 1

plugin_version: "1.7.1"

user_personas:
  - name: "Python developers integrating doxastica into a larger system (e.g. NVM)"
    skill_level: "advanced"
    assumed_knowledge:
      - "Python 3.14"
      - "pydantic v2"
      - "Dependency injection and typing.Protocol-based design"
      - "Package extras (pip install x[y])"
      - "Basic graph / embedded-database concepts"
    never_assume:
      - "AGM belief revision (revise / expand / contract) and its semantics"
      - "AGM/Hansson postulates"
      - "The Kumiho architecture"
      - "Multi-scope and world-scope rules"
      - "Superseded-chain (no-recovery) model"
      - "The BeliefStore (public) vs BackendPort (internal) seam distinction"
      - "The UUID7 ordering / derived-current contract"
    domain_context: >-
      Building append-only belief / knowledge-state management into a larger
      application — the narrative-vm (NVM) epistemic layer. Needs a correct,
      provable, append-only belief store with no narrative or LLM concepts leaking in.
    discovery_story: >-
      Found it as NVM's M0 dependency, or via the Kumiho paper reference
      (arXiv 2603.17244) while looking for a reference AGM belief-revision implementation.
    user_tasks:
      - "Construct a MemoryCore with an injected backend (in-memory or ladybug)"
      - "revise / expand / contract beliefs in a scope"
      - "Read the current belief base via query_scope (with BeliefFilter)"
      - "Inspect revision history with get_revision_chain"
      - "Reconstruct scope state at a point in time with get_scope_at"
      - "Trace dependency cascades with get_impact"
      - "Lease a shared ladybug connection under a namespace (tenant mode)"

tone: "personality"

use_cases: []

use_cases_section: false

doc_system: "mkdocs-material"
api_reference: "mkdocstrings"

paths:
  docs_root: "docs/src"
  source_root: "src/"

detected:
  language: "Python"
  doc_system: "mkdocs-material"
  existing_docs: true

qa_answers:
  navigation: "Sidebar only"
  api_docs: "mkdocstrings"
  features:
    - "Admonitions"
    - "Mermaid diagrams"
    - "Content tabs"
    - "Code annotations"
