name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  isolation:
    # D-03 Job 1: base-isolation environment. The ladybug EXTRA is deliberately NOT
    # synced (ladybug genuinely absent) to prove the D-02 driver-blind isolation — the
    # in-memory spine + import-purity scan must pass with the reference backend uninstalled.
    name: Isolation (ladybug absent)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.14"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev tools only, NO ladybug extra)
        run: uv sync --locked --no-default-groups --group dev

      - name: Assert ladybug is absent
        run: |
          uv run python -c "import importlib.util, sys; \
            spec = importlib.util.find_spec('ladybug'); \
            sys.exit('ladybug must be ABSENT in the isolation job' if spec else 0)"

      - name: Import-purity + in-memory subset (ladybug uninstalled)
        run: uv run pytest tests/test_import_purity.py tests/test_backend_memory.py

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci

  full:
    # D-03 Job 2: full environment with the ladybug reference backend installed.
    # Runs the prek quality gates + the complete suite parametrized over both backends.
    name: Full suite (with [ladybug])
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.14"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev + ladybug extra)
        run: uv sync --locked --dev --extra ladybug

      - name: Install prek
        run: uv tool install prek

      - name: Run quality gates
        run: prek run --all-files

      - name: Tests
        run: uv run pytest

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci
